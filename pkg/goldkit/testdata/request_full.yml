# Example request with all possible fields set.
request:
  scheme: https
  host: example.com
  method: POST
  path: /some/path
  query: key0=val0&key1=val1
  headers:
    - 'Authorization: Bearer token'
  meta:
    key1: val1
    key2: 123
    key3: 12.3
    key4: 2000-01-02T03:04:05Z
  bodyType: text
  body: |
    abc
